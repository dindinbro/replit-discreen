<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Body segments -->
    <ellipse cx="50" cy="63" rx="13" ry="17" fill="#f5a623"/>
    <!-- Cephalothorax (head+thorax) -->
    <ellipse cx="50" cy="41" rx="11" ry="10" fill="#f5a623"/>
    <!-- Eyes -->
    <circle cx="46" cy="38" r="1.8" fill="#1a1208"/>
    <circle cx="54" cy="38" r="1.8" fill="#1a1208"/>

    <!-- Left pedipalp (claw) -->
    <path d="M41 34 Q32 27 26 30" stroke="#f5a623" stroke-width="3" fill="none"/>
    <path d="M26 30 Q22 25 25 22" stroke="#f5a623" stroke-width="2.5" fill="none"/>
    <path d="M26 30 Q20 30 20 34" stroke="#f5a623" stroke-width="2.5" fill="none"/>
    <!-- Right pedipalp (claw) -->
    <path d="M59 34 Q68 27 74 30" stroke="#f5a623" stroke-width="3" fill="none"/>
    <path d="M74 30 Q78 25 75 22" stroke="#f5a623" stroke-width="2.5" fill="none"/>
    <path d="M74 30 Q80 30 80 34" stroke="#f5a623" stroke-width="2.5" fill="none"/>

    <!-- Left legs -->
    <line x1="38" y1="54" x2="22" y2="47" stroke="#f5a623" stroke-width="2.2"/>
    <line x1="38" y1="61" x2="20" y2="58" stroke="#f5a623" stroke-width="2.2"/>
    <line x1="38" y1="68" x2="20" y2="68" stroke="#f5a623" stroke-width="2.2"/>
    <line x1="39" y1="74" x2="23" y2="78" stroke="#f5a623" stroke-width="2.2"/>
    <!-- Right legs -->
    <line x1="62" y1="54" x2="78" y2="47" stroke="#f5a623" stroke-width="2.2"/>
    <line x1="62" y1="61" x2="80" y2="58" stroke="#f5a623" stroke-width="2.2"/>
    <line x1="62" y1="68" x2="80" y2="68" stroke="#f5a623" stroke-width="2.2"/>
    <line x1="61" y1="74" x2="77" y2="78" stroke="#f5a623" stroke-width="2.2"/>

    <!-- Tail (metasoma) arching over body -->
    <path d="M50 80 Q58 93 74 88 Q86 82 84 66 Q83 54 73 48"
          stroke="#f5a623" stroke-width="4.5" fill="none"/>
    <!-- Stinger (telson) -->
    <path d="M73 48 L80 38 L68 46 Z" fill="#f5a623"/>
    <!-- Venom droplet -->
    <circle cx="80" cy="37" r="2" fill="#f5a623" opacity="0.7"/>
  </g>
</svg>
